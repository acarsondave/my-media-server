# Media center stack.
#
# Runs behind Coolify on a low-resource VPS.
# Requires the host-level setup (rclone mount, cron) from setup.sh
# before deploying this stack.
#
# Copy .env.example to .env and fill in your values before deploying.

services:

  # -- VPN tunnel --
  # All download traffic is routed through this container.
  # Gluetun supports most major providers out of the box:
  # NordVPN, ProtonVPN, Mullvad, Surfshark, PIA, etc.
  # See https://github.com/qdm12/gluetun-wiki for provider-specific setup.
  gluetun:
    image: qmcgaw/gluetun:v3
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - VPN_SERVICE_PROVIDER=${VPN_PROVIDER:-nordvpn}
      - VPN_TYPE=${VPN_TYPE:-wireguard}
      - WIREGUARD_PRIVATE_KEY=${WIREGUARD_PRIVATE_KEY:-}
      # Uncomment these for OpenVPN instead:
      # - OPENVPN_USER=${OPENVPN_USER}
      # - OPENVPN_PASSWORD=${OPENVPN_PASSWORD}
      - SERVER_COUNTRIES=${VPN_COUNTRIES:-Netherlands}
      - TZ=${TZ:-Etc/UTC}
      - HEALTH_VPN_DURATION_INITIAL=30s
    ports:
      # Gluetun control API -- used for IP rotation
      - "127.0.0.1:8888:8000/tcp"
      # JDownloader web UI (exposed here because JD shares gluetun's network)
      - "5800:5800/tcp"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8000/v1/vpn/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  # -- Downloader --
  # Shares gluetun's network namespace so all traffic goes through the VPN.
  # Downloads land on the host SSD, then get uploaded to R2 by the cron script.
  jdownloader:
    image: jlesage/jdownloader-2:latest
    container_name: jdownloader
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy
    environment:
      - TZ=${TZ:-Etc/UTC}
      - USER_ID=1000
      - GROUP_ID=1000
    volumes:
      - jdownloader_config:/config
      - /data/downloads:/output
    restart: unless-stopped

  # -- Media server --
  # Reads from the R2 mount. The mount is read-only here so Jellyfin
  # can't accidentally modify or delete media files.
  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    environment:
      - TZ=${TZ:-Etc/UTC}
    ports:
      - "8096:8096/tcp"
    volumes:
      - jellyfin_config:/config
      - jellyfin_cache:/cache
      - /mnt/r2/media:/media:ro
    restart: unless-stopped

  # -- Subtitle manager --
  # Watches the Jellyfin library and downloads .srt subtitles.
  # Needs read-write access to the R2 mount so it can drop .srt files
  # next to the video files.
  bazarr:
    image: linuxserver/bazarr:latest
    container_name: bazarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ:-Etc/UTC}
    ports:
      - "6767:6767/tcp"
    volumes:
      - bazarr_config:/config
      - /mnt/r2/media:/media:rw
    restart: unless-stopped

volumes:
  jdownloader_config:
  jellyfin_config:
  jellyfin_cache:
  bazarr_config:
